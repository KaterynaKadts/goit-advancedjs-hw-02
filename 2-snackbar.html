<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework 10 - Snackbar</title>
    <style>
      /* Стили для соответствия макету */
      .form {
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 360px;
        padding: 24px;
      }
      fieldset {
        display: flex;
        gap: 16px;
        border: 1px solid #808080;
        border-radius: 4px;
        padding: 16px;
      }
      legend {
        padding: 0 8px;
        font-size: 14px;
      }
      .form label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 16px;
      }
      .form input[type="number"] {
        padding: 8px;
        border: 1px solid #808080;
        border-radius: 4px;
        outline: none;
      }
      button[type="submit"] {
        padding: 8px 16px;
        background-color: #4e75ff;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 250ms cubic-bezier(0.4, 0, 0.2, 1);
      }
      button[type="submit"]:hover {
        background-color: #6c8cff;
      }
    </style>
    <script type="module" crossorigin src="/goit-advancedjs-hw-02/2-snackbar.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-wCWGTnY3.js">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-HsVlV9O8.css">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/styles-CvtrWoNd.css">
  </head>
  <body>
    <header class="header">
  <div class="container">
    <nav class="nav">
      <a class="nav-logo" href="./index.html" aria-label="Site logo">
        <svg class="nav-logo-icon" width="100" height="30">
          <use href="{=$icon-path}"></use>
        </svg>
      </a>
      <ul class="nav-list">
        <li class="nav-item">
          <a class="nav-link {=$highlight-act}" href="./page-2.html">Page 2</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {=$highlight-curr}" href="./page-3.html">Page 3</a>
        </li>
      </ul>
    </nav>
  </div>
</header>


    <main class="container">
      <a href="./index.html" class="back-link">Go back</a>
      
      <h1>Promise Generator</h1>

      <form class="form">
        <label>
          Delay (ms)
          <input type="number" name="delay" required />
        </label>

        <fieldset>
          <legend>State</legend>
          <label>
            <input type="radio" name="state" value="fulfilled" required />
            Fulfilled
          </label>
          <label>
            <input type="radio" name="state" value="rejected" required />
            Rejected
          </label>
        </fieldset>

        <button type="submit">Create notification</button>
      </form>
    </main>

  </body>
</html>
